[build]
  # IMPORTANTE: usamos apenas o bundler do Vite, sem rodar `tsc -b`.
  # Isso mantém o comportamento que funciona localmente e destrava o deploy.
  command = "npx vite build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Branch deploys e Deploy Previews usam Firebase de desenvolvimento (cgim-v2-dev)
# para não contaminar o Firestore de produção (catcgim).
[context.branch-deploy.environment]
  VITE_FIREBASE_API_KEY            = "AIzaSyCRvcG0eGEpSvpdceLrbrBSF85A0Jribro"
  VITE_FIREBASE_AUTH_DOMAIN        = "cgim-v2-dev.firebaseapp.com"
  VITE_FIREBASE_PROJECT_ID         = "cgim-v2-dev"
  VITE_FIREBASE_STORAGE_BUCKET     = "cgim-v2-dev.firebasestorage.app"
  VITE_FIREBASE_MESSAGING_SENDER_ID = "383402303563"
  VITE_FIREBASE_APP_ID             = "1:383402303563:web:57c3aaf57352e4ce79edce"
  VITE_FIREBASE_MEASUREMENT_ID     = "G-KG0WNZLH75"

[context.deploy-preview.environment]
  VITE_FIREBASE_API_KEY            = "AIzaSyCRvcG0eGEpSvpdceLrbrBSF85A0Jribro"
  VITE_FIREBASE_AUTH_DOMAIN        = "cgim-v2-dev.firebaseapp.com"
  VITE_FIREBASE_PROJECT_ID         = "cgim-v2-dev"
  VITE_FIREBASE_STORAGE_BUCKET     = "cgim-v2-dev.firebasestorage.app"
  VITE_FIREBASE_MESSAGING_SENDER_ID = "383402303563"
  VITE_FIREBASE_APP_ID             = "1:383402303563:web:57c3aaf57352e4ce79edce"
  VITE_FIREBASE_MEASUREMENT_ID     = "G-KG0WNZLH75"

# SPA fallback para rotas do react-router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
